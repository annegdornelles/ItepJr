<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Proposta — CRM Portal BJ</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --blue: #0077fc;
        --bg: #0a0e17;
        --panel: #10172a;
        --green: #20d17d;
        --yellow: #ffca3a;
        --red: #ff4d4d;
      }
      html,
      body {
        height: 100%;
        overflow: hidden;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      body {
        background: var(--bg);
        color: #fff;
      }
      #deck {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
      }
      #viewport {
        flex: 1;
        overflow: hidden;
        position: relative;
      }
      #track {
        display: flex;
        height: 100%;
        transition: transform 0.65s cubic-bezier(0.65, 0, 0.35, 1);
      }
      .slide {
        height: 100%;
        flex-shrink: 0;
        position: relative;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 2rem;
        background: var(--bg);
      }
      .orb {
        pointer-events: none;
        position: absolute;
        border-radius: 50%;
        filter: blur(80px);
      }
      .orb-tl {
        width: 420px;
        height: 420px;
        background: radial-gradient(
          circle,
          rgba(0, 119, 252, 0.5),
          transparent 60%
        );
        top: -120px;
        left: -120px;
        opacity: 0.4;
      }
      .orb-br {
        width: 480px;
        height: 480px;
        background: radial-gradient(
          circle,
          rgba(0, 119, 252, 0.4),
          transparent 60%
        );
        bottom: -140px;
        right: -140px;
        opacity: 0.3;
      }
      #navbar {
        height: 68px;
        flex-shrink: 0;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(7, 11, 20, 0.92);
        backdrop-filter: blur(12px);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 1.5rem;
        gap: 1rem;
      }
      #topbadge {
        position: fixed;
        top: 1rem;
        right: 1rem;
        z-index: 99;
        display: flex;
        align-items: center;
        gap: 0.6rem;
      }
      .badge-counter {
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(0, 0, 0, 0.6);
        backdrop-filter: blur(8px);
        padding: 0.4rem 1rem;
        border-radius: 100px;
        font-size: 0.7rem;
        font-weight: 700;
        color: #fff;
      }
      .btn-pdf {
        display: flex;
        align-items: center;
        gap: 0.4rem;
        border: 1px solid rgba(255, 255, 255, 0.15);
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(8px);
        padding: 0.4rem 0.9rem;
        border-radius: 100px;
        font-size: 0.7rem;
        font-weight: 600;
        color: #fff;
        cursor: pointer;
        transition: 0.2s;
      }
      .btn-pdf:hover {
        border-color: var(--blue);
        background: rgba(0, 119, 252, 0.15);
      }
      .nav-btn {
        display: flex;
        align-items: center;
        gap: 0.4rem;
        padding: 0.5rem 1.1rem;
        border-radius: 100px;
        font-size: 0.8rem;
        font-weight: 600;
        cursor: pointer;
        transition: 0.2s;
        border: none;
      }
      .nav-btn-prev {
        border: 1px solid rgba(255, 255, 255, 0.15);
        background: rgba(255, 255, 255, 0.05);
        color: #fff;
      }
      .nav-btn-prev:hover:not(:disabled) {
        border-color: var(--blue);
        background: rgba(0, 119, 252, 0.15);
      }
      .nav-btn-next {
        background: var(--blue);
        color: #fff;
        box-shadow: 0 0 22px rgba(0, 119, 252, 0.5);
      }
      .nav-btn-next:hover:not(:disabled) {
        transform: scale(1.04);
      }
      .nav-btn:disabled {
        opacity: 0.3;
        cursor: not-allowed;
      }
      #dots {
        display: flex;
        align-items: center;
        gap: 0.4rem;
        overflow-x: auto;
      }
      .dot {
        height: 8px;
        width: 8px;
        border-radius: 100px;
        border: none;
        cursor: pointer;
        transition: 0.3s;
        background: rgba(255, 255, 255, 0.25);
      }
      .dot.active {
        width: 26px;
        background: var(--blue);
        box-shadow: 0 0 10px rgba(0, 119, 252, 0.7);
      }
      .label {
        font-size: 0.65rem;
        font-weight: 700;
        letter-spacing: 0.25em;
        color: var(--blue);
        text-transform: uppercase;
        margin-bottom: 0.6rem;
      }
      .big {
        font-size: clamp(2rem, 5vw, 3.8rem);
        font-weight: 700;
        line-height: 1.1;
        letter-spacing: -0.02em;
      }
      .mid {
        font-size: clamp(1.4rem, 3.5vw, 2.6rem);
        font-weight: 700;
        line-height: 1.15;
        letter-spacing: -0.02em;
      }
      .blue {
        color: var(--blue);
      }
      .sub {
        color: rgba(255, 255, 255, 0.65);
        line-height: 1.7;
        font-size: 0.95rem;
      }
      .content {
        position: relative;
        z-index: 1;
        width: 100%;
        max-width: 1060px;
      }
      .two-col {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 2.5rem;
        align-items: center;
        width: 100%;
      }
      .g2 {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
      }
      .g3 {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 0.9rem;
      }
      .ga {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
        gap: 0.85rem;
      }
      .gcard {
        background: rgba(16, 23, 42, 0.8);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 16px;
        padding: 1.25rem 1.5rem;
        backdrop-filter: blur(8px);
        transition: 0.25s;
      }
      .gcard:hover {
        border-color: rgba(0, 119, 252, 0.55);
        transform: translateY(-3px);
        box-shadow: 0 0 35px rgba(0, 119, 252, 0.3);
      }
      .gcard.active {
        border-color: rgba(0, 119, 252, 0.75);
        box-shadow: 0 0 40px rgba(0, 119, 252, 0.35);
      }
      .ibox {
        width: 44px;
        height: 44px;
        border-radius: 10px;
        background: rgba(0, 119, 252, 0.15);
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--blue);
        flex-shrink: 0;
        font-weight: 700;
        font-size: 1rem;
      }
      .pill {
        display: inline-flex;
        align-items: center;
        background: var(--blue);
        color: #fff;
        border-radius: 100px;
        padding: 0.45rem 1.2rem;
        font-size: 0.8rem;
        font-weight: 700;
        box-shadow: 0 0 22px rgba(0, 119, 252, 0.45);
      }
      .ghost-pill {
        display: inline-flex;
        align-items: center;
        border: 1px solid rgba(255, 255, 255, 0.14);
        background: rgba(255, 255, 255, 0.04);
        color: rgba(255, 255, 255, 0.8);
        border-radius: 100px;
        padding: 0.42rem 1rem;
        font-size: 0.74rem;
        font-weight: 650;
      }
      .price-main {
        border: 2px solid var(--blue);
        border-radius: 18px;
        padding: 1.5rem;
        background: rgba(0, 119, 252, 0.07);
        position: relative;
        box-shadow: 0 0 50px rgba(0, 119, 252, 0.24);
      }
      .price-tag {
        position: absolute;
        top: -14px;
        left: 1.5rem;
        background: var(--blue);
        color: #fff;
        border-radius: 100px;
        padding: 0.35rem 1rem;
        font-size: 0.7rem;
        font-weight: 700;
        box-shadow: 0 0 22px rgba(0, 119, 252, 0.5);
      }
      .price-line {
        display: flex;
        justify-content: space-between;
        gap: 1rem;
        padding: 0.72rem 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        color: rgba(255, 255, 255, 0.78);
        font-size: 0.9rem;
      }
      .price-line:last-child {
        border-bottom: 0;
      }
      .feature-card h3,
      .pcard h4 {
        font-size: 0.9rem;
        font-weight: 700;
        margin-bottom: 0.35rem;
      }
      .feature-card p,
      .pcard p {
        font-size: 0.75rem;
        color: rgba(255, 255, 255, 0.52);
        line-height: 1.52;
      }
      .mini {
        font-size: 0.72rem;
        color: rgba(255, 255, 255, 0.48);
        line-height: 1.5;
      }
      .kanban {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 0.55rem;
        margin-top: 1.1rem;
      }
      .lane {
        min-height: 230px;
        background: rgba(16, 23, 42, 0.78);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 14px;
        padding: 0.75rem;
      }
      .lane h4 {
        font-size: 0.72rem;
        color: #fff;
        margin-bottom: 0.6rem;
      }
      .deal {
        background: rgba(255, 255, 255, 0.055);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 10px;
        padding: 0.6rem;
        margin-bottom: 0.5rem;
        font-size: 0.68rem;
        color: rgba(255, 255, 255, 0.72);
        line-height: 1.35;
      }
      .warn {
        border-color: rgba(255, 202, 58, 0.35);
        background: rgba(255, 202, 58, 0.08);
      }
      .danger {
        border-color: rgba(255, 77, 77, 0.35);
        background: rgba(255, 77, 77, 0.08);
      }
      .traffic {
        display: flex;
        gap: 0.38rem;
        align-items: center;
        margin: 0.55rem 0;
      }
      .light {
        width: 14px;
        height: 14px;
        border-radius: 50%;
        box-shadow: 0 0 18px currentColor;
      }
      .green {
        color: var(--green);
        background: var(--green);
      }
      .yellow {
        color: var(--yellow);
        background: var(--yellow);
      }
      .red {
        color: var(--red);
        background: var(--red);
      }
      .timeline {
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }
      .tstep {
        display: flex;
        align-items: flex-start;
        gap: 1rem;
      }
      .tstep-num {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: var(--blue);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.75rem;
        font-weight: 700;
        flex-shrink: 0;
        box-shadow: 0 0 18px rgba(0, 119, 252, 0.5);
      }
      @media (max-width: 800px) {
        .two-col {
          grid-template-columns: 1fr;
          gap: 1.2rem;
        }
        .g3,
        .kanban {
          grid-template-columns: 1fr 1fr;
        }
        .slide {
          padding: 1rem;
        }
        .big {
          font-size: 1.8rem;
        }
        .mid {
          font-size: 1.4rem;
        }
        #navbar {
          padding: 0 0.75rem;
        }
        .nav-btn span {
          display: none;
        }
      }
      @media (max-width: 520px) {
        .g2,
        .g3,
        .kanban {
          grid-template-columns: 1fr;
        }
        #topbadge {
          left: 1rem;
          right: auto;
        }
      }
      @media print {
        html,
        body {
          height: auto;
          overflow: visible;
          background: #fff;
          color: #000;
        }
        #navbar,
        #topbadge {
          display: none !important;
        }
        #deck,
        #viewport,
        #track,
        .slide {
          position: static !important;
          height: auto !important;
          overflow: visible !important;
          display: block !important;
          transform: none !important;
          width: 100% !important;
        }
        .slide {
          page-break-after: always;
          min-height: 100vh;
          background: #fff !important;
          color: #000;
        }
        .orb {
          display: none;
        }
        .sub,
        .mini,
        .feature-card p,
        .pcard p {
          color: #333 !important;
        }
        .gcard,
        .lane,
        .deal,
        .price-main {
          background: #fff !important;
          border-color: #ccc !important;
          box-shadow: none !important;
        }
      }
    </style>
  </head>

      let cur = 0;
      const track = document.getElementById("track");
      const total = slides.length;
      slides.forEach((s) => {
        const sec = document.createElement("section");
        sec.className = "slide";
        sec.style.width = 100 / total + "%";
        sec.innerHTML = s.html;
        track.appendChild(sec);
      });
      track.style.width = total * 100 + "%";
      const dotsEl = document.getElementById("dots");
      slides.forEach((_, i) => {
        const d = document.createElement("button");
        d.className = "dot" + (i === 0 ? " active" : "");
        d.setAttribute("aria-label", "Slide " + (i + 1));
        d.onclick = () => goTo(i);
        dotsEl.appendChild(d);
      });
      function goTo(n) {
        cur = Math.max(0, Math.min(n, total - 1));
        track.style.transform = `translateX(-${(cur * 100) / total}%)`;
        document.getElementById("counter").textContent =
          String(cur + 1).padStart(2, "0") +
          " / " +
          String(total).padStart(2, "0") +
          " · " +
          slides[cur].label;
        document.getElementById("btnPrev").disabled = cur === 0;
        document.getElementById("btnNext").disabled = cur === total - 1;
        document
          .querySelectorAll(".dot")
          .forEach((d, i) => d.classList.toggle("active", i === cur));
      }
      function go(d) {
        goTo(cur + d);
      }
      window.go = go;
      window.goTo = goTo;
      window.addEventListener("keydown", (e) => {
        if (e.key === "ArrowRight") go(1);
        if (e.key === "ArrowLeft") go(-1);
      });
      let tx = null;
      document.getElementById("viewport").addEventListener(
        "touchstart",
        (e) => {
          tx = e.touches[0].clientX;
        },
        { passive: true },
      );
      document.getElementById("viewport").addEventListener("touchend", (e) => {
        if (tx == null) return;
        const dx = e.changedTouches[0].clientX - tx;
        if (dx < -50) go(1);
        if (dx > 50) go(-1);
        tx = null;
      });
      goTo(0);
    </script>
  </body>

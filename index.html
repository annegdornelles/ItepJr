<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Proposta — CompAct Jr. × ITEP Jr.</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --blue: #0077fc;
        --bg: #0a0e17;
        --panel: #10172a;
      }
      html,
      body {
        height: 100%;
        overflow: hidden;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      body {
        background: var(--bg);
        color: #fff;
      }
      /* layout */
      #deck {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
      }
      #viewport {
        flex: 1;
        overflow: hidden;
        position: relative;
      }
      #track {
        display: flex;
        height: 100%;
        transition: transform 0.65s cubic-bezier(0.65, 0, 0.35, 1);
      }
      .slide {
        height: 100%;
        flex-shrink: 0;
        position: relative;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 2rem;
      }
      /* glow orbs */
      .orb {
        pointer-events: none;
        position: absolute;
        border-radius: 50%;
        filter: blur(80px);
      }
      .orb-tl {
        width: 420px;
        height: 420px;
        background: radial-gradient(
          circle,
          rgba(0, 119, 252, 0.5),
          transparent 60%
        );
        top: -120px;
        left: -120px;
        opacity: 0.4;
      }
      .orb-br {
        width: 480px;
        height: 480px;
        background: radial-gradient(
          circle,
          rgba(0, 119, 252, 0.4),
          transparent 60%
        );
        bottom: -140px;
        right: -140px;
        opacity: 0.3;
      }
      /* nav bar */
      #navbar {
        height: 68px;
        flex-shrink: 0;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(7, 11, 20, 0.92);
        backdrop-filter: blur(12px);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 1.5rem;
        gap: 1rem;
      }
      /* top badge */
      #topbadge {
        position: fixed;
        top: 1rem;
        right: 1rem;
        z-index: 99;
        display: flex;
        align-items: center;
        gap: 0.6rem;
      }
      .badge-counter {
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(0, 0, 0, 0.6);
        backdrop-filter: blur(8px);
        padding: 0.4rem 1rem;
        border-radius: 100px;
        font-size: 0.7rem;
        font-weight: 700;
        color: #fff;
      }
      .btn-pdf {
        display: flex;
        align-items: center;
        gap: 0.4rem;
        border: 1px solid rgba(255, 255, 255, 0.15);
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(8px);
        padding: 0.4rem 0.9rem;
        border-radius: 100px;
        font-size: 0.7rem;
        font-weight: 600;
        color: #fff;
        cursor: pointer;
        transition: 0.2s;
      }
      .btn-pdf:hover {
        border-color: var(--blue);
        background: rgba(0, 119, 252, 0.15);
      }
      /* nav buttons */
      .nav-btn {
        display: flex;
        align-items: center;
        gap: 0.4rem;
        padding: 0.5rem 1.1rem;
        border-radius: 100px;
        font-size: 0.8rem;
        font-weight: 600;
        cursor: pointer;
        transition: 0.2s;
        border: none;
      }
      .nav-btn-prev {
        border: 1px solid rgba(255, 255, 255, 0.15);
        background: rgba(255, 255, 255, 0.05);
        color: #fff;
      }
      .nav-btn-prev:hover:not(:disabled) {
        border-color: var(--blue);
        background: rgba(0, 119, 252, 0.15);
      }
      .nav-btn-next {
        background: var(--blue);
        color: #fff;
        box-shadow: 0 0 22px rgba(0, 119, 252, 0.5);
      }
      .nav-btn-next:hover:not(:disabled) {
        transform: scale(1.04);
      }
      .nav-btn:disabled {
        opacity: 0.3;
        cursor: not-allowed;
      }
      /* dots */
      #dots {
        display: flex;
        align-items: center;
        gap: 0.4rem;
        overflow-x: auto;
      }
      .dot {
        height: 8px;
        border-radius: 100px;
        border: none;
        cursor: pointer;
        transition: 0.3s;
        background: rgba(255, 255, 255, 0.25);
      }
      .dot.active {
        background: var(--blue);
        box-shadow: 0 0 10px rgba(0, 119, 252, 0.7);
      }
      /* shared slide typography */
      .label {
        font-size: 0.65rem;
        font-weight: 700;
        letter-spacing: 0.25em;
        color: var(--blue);
        text-transform: uppercase;
        margin-bottom: 0.6rem;
      }
      .big {
        font-size: clamp(2rem, 5vw, 3.8rem);
        font-weight: 700;
        line-height: 1.1;
        letter-spacing: -0.02em;
      }
      .mid {
        font-size: clamp(1.4rem, 3.5vw, 2.6rem);
        font-weight: 700;
        line-height: 1.15;
        letter-spacing: -0.02em;
      }
      .blue {
        color: var(--blue);
      }
      .sub {
        color: rgba(255, 255, 255, 0.65);
        line-height: 1.7;
        font-size: 0.95rem;
      }
      /* card */
      .gcard {
        background: rgba(16, 23, 42, 0.8);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 16px;
        padding: 1.25rem 1.5rem;
        backdrop-filter: blur(8px);
        transition: 0.25s;
      }
      .gcard:hover {
        border-color: rgba(0, 119, 252, 0.55);
        transform: translateY(-3px);
        box-shadow: 0 0 35px rgba(0, 119, 252, 0.3);
      }
      .gcard.active {
        border-color: rgba(0, 119, 252, 0.75);
        box-shadow: 0 0 40px rgba(0, 119, 252, 0.35);
      }
      /* icon box */
      .ibox {
        width: 44px;
        height: 44px;
        border-radius: 10px;
        background: rgba(0, 119, 252, 0.15);
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--blue);
        flex-shrink: 0;
        font-weight: 700;
        font-size: 1rem;
      }
      /* pill */
      .pill {
        display: inline-flex;
        align-items: center;
        background: var(--blue);
        color: #fff;
        border-radius: 100px;
        padding: 0.45rem 1.2rem;
        font-size: 0.8rem;
        font-weight: 700;
        box-shadow: 0 0 22px rgba(0, 119, 252, 0.45);
      }
      /* grids */
      .g2 {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
      }
      .g3 {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 0.9rem;
      }
      .g4 {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 0.85rem;
      }
      .ga {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 0.85rem;
      }
      /* two col layout */
      .two-col {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 2.5rem;
        align-items: center;
        width: 100%;
      }
      /* content wrapper */
      .content {
        position: relative;
        z-index: 1;
        width: 100%;
        max-width: 1060px;
      }
      /* pricing */
      .price-main {
        border: 2px solid var(--blue);
        border-radius: 18px;
        padding: 1.5rem;
        background: rgba(0, 119, 252, 0.07);
        position: relative;
      }
      .price-tag {
        position: absolute;
        top: -14px;
        left: 1.5rem;
        background: var(--blue);
        color: #fff;
        border-radius: 100px;
        padding: 0.35rem 1rem;
        font-size: 0.7rem;
        font-weight: 700;
        box-shadow: 0 0 22px rgba(0, 119, 252, 0.5);
      }
      .price-opt {
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 14px;
        padding: 1rem;
        background: rgba(255, 255, 255, 0.02);
        cursor: pointer;
        transition: 0.25s;
      }
      .price-opt:hover {
        border-color: rgba(0, 119, 252, 0.5);
        background: rgba(0, 119, 252, 0.07);
        transform: translateY(-2px);
      }
      .price-opt.on {
        border-color: var(--blue);
        background: rgba(0, 119, 252, 0.12);
        box-shadow: 0 0 28px rgba(0, 119, 252, 0.35);
      }
      .price-opt.locked {
        opacity: 0.4;
        cursor: not-allowed;
      }
      .price-opt.locked:hover {
        transform: none;
        border-color: rgba(255, 255, 255, 0.1);
        background: rgba(255, 255, 255, 0.02);
      }
      .price-total {
        border: 2px solid var(--blue);
        border-radius: 16px;
        padding: 1.2rem 1.5rem;
        background: #070b14;
        box-shadow: 0 0 50px rgba(0, 119, 252, 0.35);
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 1rem;
      }
      .checklist li {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        font-size: 0.82rem;
        color: rgba(255, 255, 255, 0.8);
      }
      .checklist li svg {
        color: var(--blue);
        flex-shrink: 0;
      }
      .tag-ess {
        border: 1px solid var(--blue);
        color: var(--blue);
        border-radius: 100px;
        padding: 0.2rem 0.8rem;
        font-size: 0.65rem;
        font-weight: 700;
      }
      /* page cards */
      .pcard {
        background: rgba(16, 23, 42, 0.8);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 12px;
        padding: 1rem 1.1rem;
        transition: 0.2s;
      }
      .pcard:hover {
        border-color: rgba(0, 119, 252, 0.4);
        transform: translateY(-2px);
      }
      .pnum {
        font-size: 0.65rem;
        font-weight: 700;
        color: var(--blue);
        letter-spacing: 0.1em;
        margin-bottom: 0.3rem;
      }
      .pcard h4 {
        font-size: 0.82rem;
        font-weight: 700;
        margin-bottom: 0.25rem;
      }
      .pcard p {
        font-size: 0.72rem;
        color: rgba(255, 255, 255, 0.5);
        line-height: 1.5;
      }
      /* ps pills */
      .pspill {
        background: rgba(0, 119, 252, 0.12);
        border: 1px solid rgba(0, 119, 252, 0.28);
        color: rgba(99, 179, 252, 0.9);
        border-radius: 100px;
        padding: 0.35rem 0.9rem;
        font-size: 0.75rem;
      }
      /* timeline */
      .tstep {
        display: flex;
        align-items: flex-start;
        gap: 1rem;
      }
      .tstep-num {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: var(--blue);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.75rem;
        font-weight: 700;
        flex-shrink: 0;
        box-shadow: 0 0 18px rgba(0, 119, 252, 0.5);
      }
      /* prazo box */
      .prazo-box {
        border: 1px solid rgba(0, 119, 252, 0.3);
        border-radius: 14px;
        background: rgba(0, 119, 252, 0.06);
        padding: 1rem 1.25rem;
        display: flex;
        gap: 1rem;
        align-items: flex-start;
      }
      @media (max-width: 680px) {
        .g3,
        .g4 {
          grid-template-columns: 1fr 1fr;
        }
        .two-col {
          grid-template-columns: 1fr;
        }
        .big {
          font-size: 1.8rem;
        }
        .mid {
          font-size: 1.4rem;
        }
        .slide {
          padding: 1rem;
        }
      }
      @media print {
        #navbar,
        #topbadge {
          display: none !important;
        }
        #deck,
        #viewport,
        #track,
        .slide {
          position: static !important;
          height: auto !important;
          overflow: visible !important;
          display: block !important;
        }
        .slide {
          page-break-after: always;
          min-height: 100vh;
        }
        .orb {
          display: none;
        }
        body {
          background: #fff;
          color: #000;
        }
      }
    </style>
  </head>
  <body>
    <div id="deck">
      <div id="viewport">
        <div id="track"></div>
      </div>
      <div id="navbar">
        <button class="nav-btn nav-btn-prev" id="btnPrev" onclick="go(-1)">
          <svg
            width="16"
            height="16"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            viewBox="0 0 24 24"
          >
            <path d="M19 12H5M12 5l-7 7 7 7" />
          </svg>
          <span>Anterior</span>
        </button>
        <div id="dots"></div>
        <button class="nav-btn nav-btn-next" id="btnNext" onclick="go(1)">
          <span>Próximo</span>
          <svg
            width="16"
            height="16"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            viewBox="0 0 24 24"

            <path d="M5 12h14M12 5l7 7-7 7" />

          label: "Investimento",

    <div style="margin-top:.4rem">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;flex-wrap:wrap;margin-bottom:.5rem">
        <h3 style="font-size:1rem;font-weight:700">Infraestrutura + Pesquisa + Página Inicial</h3>
        <span style="font-size:1rem;font-weight:700;color:var(--blue);white-space:nowrap" id="base-total">R$ 1.400</span>
      </div>
      <ul class="checklist" style="list-style:none;display:flex;flex-direction:column;gap:.3rem">
        ${[
          ["Pesquisa da Infraestrutura Atual", "R$ 100"],
          ["Infraestrutura Geral", "R$ 500"],
          ["Página Inicial", "R$ 800"],
        ]
          .map(
            ([t, p]) => `
        <li style="justify-content:space-between"><span style="display:flex;align-items:center;gap:.5rem"><svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>${t}</span><strong style="color:var(--blue);font-size:.78rem">${p}</strong></li>`,
          )
          .join("")}
      </ul>
      <p style="font-size:.7rem;color:rgba(255,255,255,.4);margin-top:.6rem">Estes serviços entram automaticamente no cálculo final. O Painel Administrativo não está incluso na base e habilita os módulos adicionais marcados com cadeado abaixo.</p>
    </div>
  </div>

  <div style="display:flex;justify-content:space-between;align-items:center;gap:1rem;flex-wrap:wrap;margin:.2rem 0 .55rem 0">
    <h3 style="font-size:.95rem;font-weight:700">Módulos selecionáveis</h3>
    <span style="font-size:.68rem;color:rgba(255,255,255,.45)">Clique nos cards para adicionar ou remover</span>
  </div>
  <div id="mods-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:.6rem;margin-bottom:1rem"></div>

  <div class="price-total" style="margin-bottom:1rem">
    <div>
      <p style="font-size:.6rem;letter-spacing:.2em;color:var(--blue);text-transform:uppercase">Investimento Total da Proposta</p>
      <p style="font-size:.75rem;color:rgba(255,255,255,.5)" id="mod-count">Base inclusa + 0 módulos adicionais selecionados</p>
      <p style="font-size:.72rem;color:rgba(255,255,255,.45);margin-top:.25rem" id="price-breakdown">Base: R$ 1.400 · Adicionais: R$ 0</p>
    </div>
    <p style="font-size:2.2rem;font-weight:700;color:var(--blue);text-shadow:0 0 22px rgba(0,119,252,.6)" id="price-total">R$ 1.400</p>
  </div>

  <div class="prazo-box">
    <div>
      <h3 style="font-size:.88rem;font-weight:700;margin-bottom:.3rem">Prazo Previsto</h3>
      <p style="font-size:.78rem;color:rgba(255,255,255,.6);line-height:1.6">O website funcional e estático fica pronto no <strong style="color:#fff">primeiro mês</strong> (a depender da validação do cliente). As demais funcionalidades selecionadas são adicionadas em <strong style="color:#fff">até 4 meses</strong>.</p>
    </div>
  </div>
</div>`,
        },
      ];

      // ---- VALOR BASE + MÓDULOS SELECIONÁVEIS ----
      const BASE_SERVICOS = 1400;
      // req: true => só pode ser marcado se o Painel Administrativo estiver selecionado
      const MODULOS = [
        {
          id: "painel",
          n: "Painel Administrativo (login integrado)",
          p: 500,
          req: false,
          desc: "Ambiente para login dos membros da ITEP, habilitando os recursos dinâmicos do site.",
        },
        {
          id: "users",
          n: "Cadastro de Usuários",
          p: 200,
          req: true,
          desc: "Divisão de usuários (admins e membros), com cadastro e exclusão livre pelos administradores.",
        },
        {
          id: "blog",
          n: "Blog",
          p: 400,
          req: true,
          desc: "Publicação de posts com imagem de capa, texto e imagens.",
        },
        {
          id: "about",
          n: "Página Quem Somos",
          p: 200,
          req: false,
          desc: "Apresentação institucional: história, valores, missão e visão.",
        },
        {
          id: "members",
          n: "Membros",
          p: 200,
          req: true,
          desc: "Registro e apresentação dos membros, com fotos, cargos e LinkedIn.",
        },
        {
          id: "contact",
          n: "Página Contato",
          p: 200,
          req: false,
          desc: "Formulário de contato e CTAs para WhatsApp e redes sociais.",
        },
        {
          id: "services",
          n: "Página Serviços",
          p: 200,
          req: false,
          desc: "Página explicando quais serviços a ITEP presta.",
        },
        {
          id: "gestao",
          n: "Página de Cada Tipo de Gestão",
          p: 400,
          req: false,
          desc: "Uma página para cada serviço de gestão (produção, processos, financeira, estratégica).",
        },
        {
          id: "svc-ind",
          n: "Página de Cada Serviço",
          p: 200,
          req: false,
          desc: "Uma página por serviço, seguindo um modelo base.",
        },
        {
          id: "port-fix",
          n: "Página Portfólio (fixo)",
          p: 700,
          req: false,
          desc: "Portfólio com serviços pré-definidos já prestados pela ITEP Jr.",
        },
        {
          id: "port-din",
          n: "Página Portfólio (dinâmico)",
          p: 800,
          req: true,
          desc: "Portfólio integrado aos serviços, atualizado pelos membros ao longo do tempo.",
        },
        {
          id: "material-gratuito",
          n: "Material Gratuito",
          p: 600,
          req: true,
          desc: "Área para download gratuito de planilhas, ebooks e outros conteúdos, liberados após formulário de contato para qualificação passiva de leads.",
        },
        {
          id: "ps",
          n: "Página Processo Seletivo",
          p: 400,
          req: false,
          desc: "Prospecção de novos membros, com cronograma e contagem regressiva.",
        },
        {
          id: "adgrants",
          n: "Ad Grants (gerenciamento, adaptação e suporte)",
          p: 700,
          req: false,
          desc: "Adequação do site ao programa Google Ad Grants e auxílio na inscrição.",
        },
      ];

      const sel = new Set();
      let cur = 0;

      function fmt(n) {
        return "R$ " + n.toLocaleString("pt-BR");
      }

      function buildMods() {
        const grid = document.getElementById("mods-grid");
        if (!grid) return;
        grid.innerHTML = "";
        MODULOS.forEach((m) => {
          const on = sel.has(m.id);
          const locked = m.req && !sel.has("painel");
          const d = document.createElement("div");
          d.className =
            "price-opt" + (on ? " on" : "") + (locked ? " locked" : "");
          if (locked) d.title = "Requer o Painel Administrativo";
          d.innerHTML = `
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem">
        <span style="font-size:.78rem;font-weight:700;color:#fff;line-height:1.3">${m.n}</span>
        <div style="width:18px;height:18px;border-radius:50%;border:1.5px solid ${on ? "var(--blue)" : "rgba(255,255,255,.3)"};background:${on ? "var(--blue)" : "transparent"};display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-left:.5rem">
          ${on ? '<svg width="10" height="10" fill="none" stroke="#fff" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>' : ""}
        </div>
      </div>
      <p style="font-size:.68rem;color:rgba(255,255,255,.45);line-height:1.4;margin-bottom:.5rem">${m.desc}</p>
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:.75rem;font-weight:700;color:var(--blue)">${fmt(m.p)}</span>
        ${locked ? '<span style="font-size:.6rem;color:rgba(255,255,255,.4)">Requer Painel</span>' : ""}
      </div>`;
          d.onclick = () => {
            if (locked) return;
            if (sel.has(m.id)) {
              sel.delete(m.id);
              // se desmarcar o painel, remove tudo que dependia dele
              if (m.id === "painel") {
                MODULOS.forEach((x) => {
                  if (x.req) sel.delete(x.id);
                });
              }
            } else {
              sel.add(m.id);
            }
            buildMods();
            updateTotal();
          };
          grid.appendChild(d);
        });
      }

      function updateTotal() {
        const items = MODULOS.filter((m) => sel.has(m.id));
        const adicionais = items.reduce((a, m) => a + m.p, 0);
        const total = BASE_SERVICOS + adicionais;
        const el = document.getElementById("price-total");
        const ct = document.getElementById("mod-count");
        const bd = document.getElementById("price-breakdown");
        if (el) el.textContent = fmt(total);
        if (bd)
          bd.textContent =
            "Base: " + fmt(BASE_SERVICOS) + " · Adicionais: " + fmt(adicionais);
        if (ct)
          ct.textContent =
            "Base inclusa + " +
            items.length +
            " módulo" +
            (items.length !== 1 ? "s" : "") +
            " adicional" +
            (items.length !== 1 ? "is" : "") +
            " selecionado" +
            (items.length !== 1 ? "s" : "");
      }

      // ---- DECK ----
      const track = document.getElementById("track");
      const total = slides.length;

      slides.forEach((s) => {
        const sec = document.createElement("section");
        sec.className = "slide";
        sec.style.width = 100 / total + "%";
        sec.style.background = "var(--bg)";
        sec.innerHTML = s.html;
        track.appendChild(sec);
      });
      track.style.width = total * 100 + "%";

      const dotsEl = document.getElementById("dots");
      slides.forEach((_, i) => {
        const d = document.createElement("button");
        d.className = "dot" + (i === 0 ? " active" : "");
        d.style.width = "8px";
        d.setAttribute("aria-label", "Slide " + (i + 1));
        d.onclick = () => goTo(i);
        dotsEl.appendChild(d);
      });

      function goTo(n) {
        cur = Math.max(0, Math.min(n, total - 1));
        track.style.transform = `translateX(-${(cur * 100) / total}%)`;
        document.getElementById("counter").textContent =
          String(cur + 1).padStart(2, "0") +
          " / " +
          String(total).padStart(2, "0") +
          " · " +
          slides[cur].label;
        document.getElementById("btnPrev").disabled = cur === 0;
        document.getElementById("btnNext").disabled = cur === total - 1;
        document.querySelectorAll(".dot").forEach((d, i) => {
          d.classList.toggle("active", i === cur);
          d.style.width = i === cur ? "26px" : "8px";
        });
        if (document.getElementById("mods-grid")) {
          setTimeout(() => {
            buildMods();
            updateTotal();
          }, 100);
        }
      }

      function go(d) {
        goTo(cur + d);
      }

      // keyboard
      window.addEventListener("keydown", (e) => {
        if (e.key === "ArrowRight") go(1);
        if (e.key === "ArrowLeft") go(-1);
      });

      // touch/swipe
      let tx = null;
      document.getElementById("viewport").addEventListener(
        "touchstart",
        (e) => {
          tx = e.touches[0].clientX;
        },
        { passive: true },
      );
      document.getElementById("viewport").addEventListener("touchend", (e) => {
        if (tx == null) return;
        const dx = e.changedTouches[0].clientX - tx;
        if (dx < -50) go(1);
        if (dx > 50) go(-1);
        tx = null;
      });

      goTo(0);
    </script>
  </body>
</html>
